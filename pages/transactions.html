<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCash Transaction Tracker - All Transactions</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/transactions.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="2" y="2" width="20" height="20" rx="2"/>
                    <path d="M12 2v20M2 12h20"/>
                </svg>
                <span>GCash Tracker</span>
            </div>
            <div class="nav-links">
                <a href="../index.html" class="nav-link">Dashboard</a>
                <a href="transactions.html" class="nav-link active">Transactions</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>All Transactions</h1>
            <p class="subtitle">View and manage all your GCash transactions</p>
        </div>

        <div class="actions-bar">
            <a href="form.html" class="btn btn-primary">+ Add Transaction</a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by mobile number...">
            </div>
        </div>

        <div class="transactions-container">
            <div id="transactionsTable" class="transactions-table">
                <div class="table-header">
                    <div class="col col-date">Date</div>
                    <div class="col col-type">Type</div>
                    <div class="col col-mobile">Mobile</div>
                    <div class="col col-amount">Amount</div>
                    <div class="col col-fee">Fee</div>
                    <div class="col col-reference">Reference</div>
                    <div class="col col-timestamp">Timestamp</div>
                    <div class="col col-actions">Actions</div>
                </div>
                <div class="table-body" id="tableBody">
                    <div class="empty-state">
                        <p>No transactions found</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/transactions.js"></script>
</body>
</html>
